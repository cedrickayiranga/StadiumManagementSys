services:
  db:
    image: postgres:15-alpine
    container_name: stadium_db
    environment:
      POSTGRES_DB: stadium_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./Backend/stadiumManagement
    container_name: stadium_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/stadium_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
    depends_on:
      - db

  frontend:
    build: ./Frontend
    container_name: stadium_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
